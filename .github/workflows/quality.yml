name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Build, lint, typecheck, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2
          coverage: none

      - name: Verify PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify isolated runtime
        run: |
          composer scope-dependencies
          git diff --exit-code -- vendor-prefixed

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: PHP syntax
        shell: bash
        run: find . -path ./node_modules -prune -o -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Check whitespace
        run: git diff --check -- . ':(exclude)vendor-prefixed/**'
